name: data-analytics-pipeline-ci

on:
  push:
    branches: [ "main" ]

jobs:

  test:

    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16

        env:
          POSTGRES_USER: ${{ secrets.DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_DB: ${{ secrets.DB_NAME }}

        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install --upgrade pip setuptools wheel
      - run: pip install -r requirements.txt
          
      - run: pytest
        env:
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_HOST: localhost
          DB_PORT: 5432

      - name: Execute Medallion Pipeline & Extract CSVs
        run: python scripts/pipeline.py
        env:
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_HOST: localhost
          DB_PORT: 5432

      - name: Commit and Push Updated CSVs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add explicit files instead of wildcard
          git add data/reporting_mart.csv
          git add data/fact_sales.csv
          git add data/dim_customers.csv
          git add data/dim_product.csv
          
          # Only commit if these specific files actually changed
          git diff-index --quiet HEAD || (git commit -m "Automated data refresh: updated gold layer CSVs" && git push)